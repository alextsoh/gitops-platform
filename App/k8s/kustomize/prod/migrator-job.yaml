apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrate
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: workload-identity-sa
      containers:
      - name: migrator
        image: alextsoh/db-migrator:multiplatform
        imagePullPolicy: Always
        args:
          - -path=/app/migrations
          - -database=$(DATABASE_URL)
          - up
        env:
          - name: DATABASE_URL_FILE
            value: "/mnt/secrets/DB-URL-PROD"
        volumeMounts:
          - name: secrets-store
            mountPath: "/mnt/secrets"
            readOnly: true
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: "prod-my-app-secrets"
      restartPolicy: OnFailure
