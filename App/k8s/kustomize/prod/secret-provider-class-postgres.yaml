apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: postgres-secrets
  namespace: postgres
  annotations:
    argocd.argoproj.io/sync-wave: "-4"
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: "fe82db3b-c013-4785-b9c5-c71ee9bf7993"
    keyvaultName: "myapp-prod-vault-01"
    tenantId: "7b0cb2bf-b6cb-4d8f-8666-f584b3dec443"
    objects: |
      array:
        - |
          objectName: PG-SUPERUSER-USERNAME-PROD
          objectType: secret
        - |
          objectName: PG-SUPERUSER-PASSWORD-PROD
          objectType: secret

  secretObjects:
    - secretName: prod-pg-superuser-auth
      type: kubernetes.io/basic-auth
      data:
        - objectName: PG-SUPERUSER-USERNAME-PROD
          key: username
        - objectName: PG-SUPERUSER-PASSWORD-PROD
          key: password
