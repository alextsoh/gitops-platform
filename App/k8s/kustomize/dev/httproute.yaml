#https://gateway-api.sigs.k8s.io/concepts/api-overview/#httproute Documentation
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: app-route
  namespace: my-app
spec:
  parentRefs:
    - name: dev-app-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/node
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: dev-api-node
          port: 3000
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: dev-client-react-nginx
          port: 8080
