apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-node
  namespace: my-app
spec:
  replicas: 1
  template:
    spec:
      containers:
      - name: api-node
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
