apiVersion: apps/v1
kind: Deployment
metadata:
  name: client-react-nginx
  namespace: my-app
  labels:
    app: client-react-nginx
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: client-react-nginx
  template:
    metadata:
      labels:
        app: client-react-nginx
    spec:
      containers:
        - image: client-react-placeholder
          imagePullPolicy: Always
          name: client-react-nginx
          volumeMounts:
            - name: nginx-conf-vol
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          ports:
            - containerPort: 8080
              protocol: TCP
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /ping
              port: 8080
          resources:
            limits:
              cpu: 100m
              memory: 100Mi
            requests:
              cpu: 50m
              memory: 100Mi
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: nginx-conf-vol
          configMap:
            # Kustomize uses this name to find the generator and rename it
            name: nginx-conf