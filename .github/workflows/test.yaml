name: Test Workflow

on:
   push:
    branches: [main]
    paths: ['App/api-node/**', 'App/client-react/**']
    tags: ['[0-9]*.[0-9]*.[0-9]*']
 

jobs:
  # Lint and test API
  api-test:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      
      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: 'App/api-node/package.json'
          cache: 'npm'
          cache-dependency-path: 'App/api-node/package-lock.json'
      
      - name: Install dependencies
        working-directory: App/api-node
        run: npm ci
      
      - name: Lint code
        working-directory: App/api-node
        run: npm run lint
      
      - name: Run tests
        working-directory: App/api-node
        run: npm test

  # Lint and build React
  client-test:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      
      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: 'App/client-react/package.json'
          cache: 'npm'
          cache-dependency-path: 'App/client-react/package-lock.json'
      
      - name: Install dependencies
        working-directory: App/client-react
        run: npm ci

      - name: Audit dependencies
        working-directory: App/client-react
        run: npm audit --audit-level=high
      
      - name: Lint code
        working-directory: App/client-react
        run: npm run lint
      
      - name: Build
        working-directory: App/client-react
        run: npm run build