name: image-ci

on:  
  push:
    branches: [main]
    paths: ['App/api-node/**','App/client-react/**']
  workflow_dispatch:

jobs:
  # STEP 1: Detect which folders actually changed
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      # This mapping tells the next jobs which services to run
      api-golang: ${{ steps.filter.outputs.api-golang }}
      api-node: ${{ steps.filter.outputs.api-node }}
      client-react: ${{ steps.filter.outputs.client-react }}
      postgresql: ${{ steps.filter.outputs.postgresql }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api-node: 'App/api-node/**'
            client-react: 'App/client-react/**'
            postgresql: 'App/postgresql/**'
  
  generate-image-tag:
    needs: detect-changes
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.generate-image-tag.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate Image Tag
        id: generate-image-tag
        run: echo "image_tag=$(git describe --tags --always --first-parent --match "[0-9]*.[0-9]*.[0-9]*")" >> $GITHUB_OUTPUT
      - name: Show Image Tag
        run: |
          echo "Generated image tag: ${{ steps.generate-image-tag.outputs.image_tag }}"
          echo "image_tag=${{ steps.generate-image-tag.outputs.image_tag }}" >> $GITHUB_STEP_SUMMARY


  build-and-push:
    needs: [detect-changes, generate-image-tag]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: api-node
            path: App/api-node
            should_run: ${{ needs.detect-changes.outputs.api-node }}
          - name: client-react
            path: App/client-react
            should_run: ${{ needs.detect-changes.outputs.client-react }}
    
    # Only run the matrix item if the folder actually changed!
    if: matrix.should_run == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.path }}
          push: true
          # This uses the tag you generated in the previous job
          tags: alextsoh/${{ matrix.name }}:${{ needs.generate-image-tag.outputs.image_tag }}