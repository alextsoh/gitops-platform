name: image-ci

on:  
  push:
    branches: [main]
    paths: ['App/api-node/**','App/client-react/**']
  workflow_dispatch:
    inputs:
      service:
        description: 'Optional: specific service to build'
        required: false
        type: choice
        options:
          - all
          - api-node
          - client-react
          - postgresql

jobs:
  # STEP 1: Detect which folders actually changed
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      # This mapping tells the next jobs which services to run
      api-golang: ${{ steps.filter.outputs.api-golang }}
      api-node: ${{ steps.filter.outputs.api-node }}
      client-react: ${{ steps.filter.outputs.client-react }}
      postgresql: ${{ steps.filter.outputs.postgresql }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api-node: 'App/api-node/**'
            client-react: 'App/client-react/**'
            postgresql: 'App/postgresql/**'

  test-job:
    needs: detect-changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Show detected changes
        run: |
          echo "api-node changed: ${{ needs.detect-changes.outputs.api-node }}"
          echo "client-react changed: ${{ needs.detect-changes.outputs.client-react }}"
          echo "postgresql changed: ${{ needs.detect-changes.outputs.postgresql }}"
          echo "Workflow triggered by: ${{ github.event_name }}"