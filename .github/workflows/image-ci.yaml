name: image-ci

on:  
  push:
    branches: [main]
    paths: ['App/api-node/**','App/client-react/**']
  workflow_dispatch:

jobs:
  # STEP 1: Detect which folders actually changed
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      # This mapping tells the next jobs which services to run
      api-golang: ${{ steps.filter.outputs.api-golang }}
      api-node: ${{ steps.filter.outputs.api-node }}
      client-react: ${{ steps.filter.outputs.client-react }}
      postgresql: ${{ steps.filter.outputs.postgresql }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api-node: 'App/api-node/**'
            client-react: 'App/client-react/**'
            postgresql: 'App/postgresql/**'
  
  generate-image-tag:
    needs: detect-changes
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.generate-image-tag.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate Image Tag
        id: generate-image-tag
        run: echo "image_tag=$(git describe --tags --always --first-parent --match "[0-9]*.[0-9]*.[0-9]*")" >> $GITHUB_OUTPUT
      - name: Show Image Tag
        run: |
          echo "Generated image tag: ${{ steps.generate-image-tag.outputs.image_tag }}"
          echo "image_tag=${{ steps.generate-image-tag.outputs.image_tag }}" >> $GITHUB_STEP_SUMMARY


  build-and-push:
    needs: [detect-changes, generate-image-tag]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: api-node
            path: App/api-node
            dockerfile: Dockerfile
            should_run: ${{ needs.detect-changes.outputs.api-node }}
          - name: client-react
            path: App/client-react
            dockerfile: Dockerfile.nginx
            should_run: ${{ needs.detect-changes.outputs.client-react }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        if: matrix.should_run == 'true'

      - name: Login to Registry
        uses: docker/login-action@v3
        if: matrix.should_run == 'true'
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        if: matrix.should_run == 'true'
        with:
          context: ${{ matrix.path }}
          file: ${{ matrix.path }}/${{ matrix.dockerfile }}
          push: true
          # This uses the tag you generated in the previous job
          tags: alextsoh/${{ matrix.name }}:${{ needs.generate-image-tag.outputs.image_tag }}
    

  update-manifests:
    needs: [detect-changes, generate-image-tag, build-and-push]
    runs-on: ubuntu-latest
    if: ${{ needs.detect-changes.outputs.api-node == 'true' || needs.detect-changes.outputs.client-react == 'true' }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # This is critical for pushing back to the repo
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Update Image Tags
        run: |
          cd k8s/kustomize/dev
          
          # We ONLY update the specific image names defined in your kustomization
          TAG=${{ needs.generate-image-tag.outputs.image_tag }}
          
          if [ "${{ needs.detect-changes.outputs.api-node }}" == "true" ]; then
            kustomize edit set image api-node-placeholder=alextsoh/api-node:$TAG
          fi
          
          if [ "${{ needs.detect-changes.outputs.client-react }}" == "true" ]; then
            kustomize edit set image client-react-placeholder=alextsoh/client-react:$TAG
          fi