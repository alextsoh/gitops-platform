name: image-ci

on:  
  push:
    branches: [main]
    paths: ['App/api-node/**','App/client-react/**']
    tags: ['[0-9]*.[0-9]*.[0-9]*']
  workflow_dispatch:

jobs:
  # STEP 1: Detect which folders actually changed
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      # Build if code changed OR if we are pushing a Tag
      api-node: ${{ steps.filter.outputs.api-node == 'true' || startsWith(github.ref, 'refs/tags/') }}
      client-react: ${{ steps.filter.outputs.client-react == 'true' || startsWith(github.ref, 'refs/tags/') }}
      # Identify if this is a "Production Release" via Tag
      is_prod: ${{ startsWith(github.ref, 'refs/tags/') }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api-node: 'App/api-node/**'
            client-react: 'App/client-react/**'
  
  generate-image-tag:
    needs: detect-changes
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.generate-image-tag.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate Image Tag
        id: generate-image-tag
        run : |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "image_tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "is_prod=true" >> $GITHUB_OUTPUT
          else
            LONG_TAG=$(git describe --tags --always --long --first-parent --match "[0-9]*.[0-9]*.[0-9]*")
            echo "image_tag=$LONG_TAG" >> $GITHUB_OUTPUT
            echo "is_prod=false" >> $GITHUB_OUTPUT
          fi

          echo "image_tag=$TAG" >> $GITHUB_OUTPUT
          
          # Export to the step variable for the "Show" step below
          echo "CURRENT_TAG=$TAG" >> $GITHUB_ENV

      - name: Show Image Tag
        run: |
          echo "Generated image tag: ${{ steps.generate-image-tag.outputs.image_tag }}"
          echo "###  Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "* **Image Tag:** \`${{ steps.generate-image-tag.outputs.image_tag }}\`" >> $GITHUB_STEP_SUMMARY



  build-and-push:
    needs: [detect-changes, generate-image-tag]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: api-node
            path: App/api-node
            dockerfile: Dockerfile
            should_run: ${{ needs.detect-changes.outputs.api-node }}
          - name: client-react
            path: App/client-react
            dockerfile: Dockerfile.nginx
            should_run: ${{ needs.detect-changes.outputs.client-react }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        if: matrix.should_run == 'true'

      - name: Login to Registry
        uses: docker/login-action@v3
        if: matrix.should_run == 'true'
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push
        uses: docker/build-push-action@v5
        if: matrix.should_run == 'true'
        with:
          context: ${{ matrix.path }}
          file: ${{ matrix.path }}/${{ matrix.dockerfile }}
          push: true
          # This uses the tag generated in the previous job
          platforms: linux/amd64,linux/arm64
          tags: alextsoh/${{ matrix.name }}:${{ needs.generate-image-tag.outputs.image_tag }}


  update-manifests:
    needs: [detect-changes, generate-image-tag, build-and-push]
    runs-on: ubuntu-latest
    if: ${{ needs.detect-changes.outputs.api-node == 'true' || needs.detect-changes.outputs.client-react == 'true' }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Kustomize
        uses: imranismail/setup-kustomize@v2
        
        # Update tags to dev and prod kustomize overlays after merge
      - name: Update Image Tags
        run: |
          TAG=${{ needs.generate-image-tag.outputs.image_tag }}
          IS_PROD=${{ needs.detect-changes.outputs.is_prod }}
        
          cd App/k8s/kustomize/dev 
          if [ "${{ needs.detect-changes.outputs.api-node }}" == "true" ]; then
            kustomize edit set image api-node-placeholder=alextsoh/api-node:$TAG
          fi
          if [ "${{ needs.detect-changes.outputs.client-react }}" == "true" ]; then
            kustomize edit set image client-react-placeholder=alextsoh/client-react:$TAG
          fi

          if [ "$IS_PROD" == "true" ]; then

            cd ../prod
            if [ "${{ needs.detect-changes.outputs.api-node }}" == "true" ]; then
              kustomize edit set image api-node-placeholder=alextsoh/api-node:$TAG
            fi
            if [ "${{ needs.detect-changes.outputs.client-react }}" == "true" ]; then
              kustomize edit set image client-react-placeholder=alextsoh/client-react:$TAG
            fi
          fi

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          base: main
          token: ${{ secrets.CI_PAT_PR }}
          title: "Update image tags to ${{ needs.generate-image-tag.outputs.image_tag }}"