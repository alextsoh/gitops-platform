name: Build and Push

on:  
  push:
    branches: [main]
    paths: ['App/api-node/**','App/client-react/**']
    tags: ['[0-9]*.[0-9]*.[0-9]*']
  workflow_dispatch:
  workflow_run:
    workflows: ["Test"]
    types: [completed]

env:
  DASHBOARD_URL: https://004f985ae0100a.lhr.life #url for localhost reverse proxy for demo

jobs:
  # STEP 1: Detect which folders actually changed
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      # Build if code changed OR if we are pushing a Tag
      api-node: ${{ steps.filter.outputs.api-node == 'true' || startsWith(github.ref, 'refs/tags/') }}
      client-react: ${{ steps.filter.outputs.client-react == 'true' || startsWith(github.ref, 'refs/tags/') }}
      # Identify if this is a "Production Release" via Tag
      is_prod: ${{ startsWith(github.ref, 'refs/tags/') }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            api-node: 'App/api-node/**'
            client-react: 'App/client-react/**'
  
  generate-image-tag:
    needs: detect-changes
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.generate-image-tag.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Generate Image Tag
        id: generate-image-tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            # Use the ref_name for tags
            FINAL_TAG="${{ github.ref_name }}"
            echo "is_prod=true" >> $GITHUB_OUTPUT
          else
            # Use git describe for normal pushes
            # Note: Added the * wildcard to match tags starting with 'v' or numbers
            FINAL_TAG=$(git describe --tags --always --long --first-parent --match "*[0-9]*.[0-9]*.[0-9]*")
            echo "is_prod=false" >> $GITHUB_OUTPUT
          fi
          echo "image_tag=$FINAL_TAG" >> $GITHUB_OUTPUT
      - name: Show Image Tag
        run: |
          echo "Generated image tag: ${{ steps.generate-image-tag.outputs.image_tag }}"

  build-and-push:
    needs: [detect-changes, generate-image-tag]
    runs-on: ubuntu-latest
    permissions:                      # ← ADD FOR SECURE CHAIN APP
      contents: read
      id-token: write
    strategy:
      matrix:
        include:
          - name: api-node
            path: App/api-node
            dockerfile: Dockerfile
            should_run: ${{ needs.detect-changes.outputs.api-node }}
          - name: client-react
            path: App/client-react
            dockerfile: Dockerfile.nginx
            should_run: ${{ needs.detect-changes.outputs.client-react }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: matrix.should_run == 'true'

      - name: Login to Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        if: matrix.should_run == 'true'
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build and Push
        id: build                     # ← ADD FOR SECURE CHAIN APP
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        if: matrix.should_run == 'true'
        with:
          context: ${{ matrix.path }}
          file: ${{ matrix.path }}/${{ matrix.dockerfile }}
          push: true
          # This uses the tag generated in the previous job
          tags: alextsoh/${{ matrix.name }}:${{ needs.generate-image-tag.outputs.image_tag }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Secure pipeline report          # ← ADD this whole step
        if: matrix.should_run == 'true'
        uses: alextsoh/secure-pipeline-action@290239de7acb3f24225184a1272b867ffc5a462b
        with:
          image: docker.io/alextsoh/${{ matrix.name }}@${{ steps.build.outputs.digest }}
          component: ${{ matrix.name }}
          tags: ${{ needs.generate-image-tag.outputs.image_tag }}
          dashboard-url: ${{ env.DASHBOARD_URL }}

  update-manifests:
    needs: [detect-changes, generate-image-tag, build-and-push]
    runs-on: ubuntu-latest
    if: ${{ needs.detect-changes.outputs.api-node == 'true' || needs.detect-changes.outputs.client-react == 'true' }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Kustomize
        uses: imranismail/setup-kustomize@53f941b41dca13ed61874bbc6b4b6e1562877530 # v3.0.0
        
        # Update tags to dev and prod kustomize overlays after merge
      - name: Update Image Tags
        run: |
          TAG=${{ needs.generate-image-tag.outputs.image_tag }}
          IS_PROD=${{ needs.detect-changes.outputs.is_prod }}
        
          cd App/k8s/kustomize/dev 
          if [ "${{ needs.detect-changes.outputs.api-node }}" == "true" ]; then
            kustomize edit set image api-node-placeholder=alextsoh/api-node:$TAG
          fi
          if [ "${{ needs.detect-changes.outputs.client-react }}" == "true" ]; then
            kustomize edit set image client-react-placeholder=alextsoh/client-react:$TAG
          fi

          if [ "$IS_PROD" == "true" ]; then

            cd ../prod
            if [ "${{ needs.detect-changes.outputs.api-node }}" == "true" ]; then
              kustomize edit set image api-node-placeholder=alextsoh/api-node:$TAG
            fi
            if [ "${{ needs.detect-changes.outputs.client-react }}" == "true" ]; then
              kustomize edit set image client-react-placeholder=alextsoh/client-react:$TAG
            fi
          fi

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 #v8.1.1
        with:
          base: main
          token: ${{ secrets.CI_PAT_PR }}
          title: "Update image tags to ${{ needs.generate-image-tag.outputs.image_tag }}"

